<!DOCTYPE html>
<html>
<head>
    <title>Ahorcado</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d1b5e; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 1rem; }
        .card { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; width: 100%; max-width: 400px; }
        .logo-panel { background: #1a3a8f; border: 3px solid #2a52c9; border-radius: 20px; padding: 1.5rem 2rem; display: flex; flex-direction: column; align-items: center; gap: 0.75rem; width: 100%; }
        .logo-title { font-family: 'Fredoka One', cursive; font-size: clamp(2.2rem, 8vw, 3.5rem); color: #fff; text-shadow: 0 5px 0 #0a206e; letter-spacing: 4px; line-height: 1; }
        .logo-sub { font-family: 'Fredoka One', cursive; font-size: clamp(0.75rem, 3vw, 1rem); color: #f5a623; letter-spacing: 6px; text-transform: uppercase; text-shadow: 0 2px 0 #7a3d00; }
        .decoracion { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .letra-deco { background: #0f2266; border: 2px solid #2a52c9; border-bottom: 4px solid #f5a623; color: #fff; font-family: 'Fredoka One', cursive; font-size: clamp(1.1rem, 4vw, 1.4rem); width: clamp(36px, 10vw, 44px); height: clamp(44px, 12vw, 52px); display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        .letra-deco.vacio { color: transparent; }
        .form-panel { background: #1a3a8f; border-radius: 20px; border: 3px solid #2a52c9; padding: 1.75rem; width: 100%; display: flex; flex-direction: column; gap: 1rem; align-items: center; }
        .panel-label { font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 2px; color: #7aa3f5; text-transform: uppercase; text-align: center; }
        .btn-jugar { background: #4caf50; border: none; border-bottom: 5px solid #2e7d32; color: #fff; padding: 16px; border-radius: 14px; font-family: 'Fredoka One', cursive; font-size: clamp(1.2rem, 5vw, 1.4rem); cursor: pointer; letter-spacing: 3px; width: 100%; transition: transform 0.1s; }
        .btn-jugar:hover { background: #43a047; }
        .btn-jugar:active { border-bottom: 2px solid #2e7d32; transform: translateY(3px); }

        @media (max-width: 400px) {
            body { padding: 0.75rem; align-items: flex-start; padding-top: 2rem; }
            .logo-panel { padding: 1.25rem 1rem; }
            .form-panel { padding: 1.25rem 1rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-panel">
            <svg width="80" height="100" xmlns="http://www.w3.org/2000/svg">
                <line x1="40" y1="0" x2="40" y2="18" stroke="#4c7af5" stroke-width="4" stroke-linecap="round"/>
                <line x1="15" y1="0" x2="65" y2="0" stroke="#4c7af5" stroke-width="4" stroke-linecap="round"/>
                <circle cx="40" cy="33" r="14" stroke="#fff" stroke-width="3" fill="none"/>
                <line x1="40" y1="47" x2="40" y2="78" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
                <line x1="40" y1="57" x2="22" y2="72" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
                <line x1="40" y1="57" x2="58" y2="72" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
                <line x1="40" y1="78" x2="24" y2="98" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
                <line x1="40" y1="78" x2="56" y2="98" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
            </svg>
            <div class="logo-title">AHORCADO</div>
            <div class="logo-sub">el juego de palabras</div>
            <div class="decoracion">
                <div class="letra-deco vacio">_</div>
                <div class="letra-deco">A</div>
                <div class="letra-deco vacio">_</div>
                <div class="letra-deco">O</div>
                <div class="letra-deco vacio">_</div>
            </div>
        </div>

        <div class="form-panel">
            <div class="panel-label">Listo para adivinar?</div>
            <form action="/jugar" method="POST" style="width:100%;">
                <button class="btn-jugar" type="submit">Jugar</button>
            </form>
        </div>
    </div>
</body>
</html>
